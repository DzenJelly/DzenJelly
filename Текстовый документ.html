<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DzenJelly!</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        /* Основные стили и Красивый Шрифт */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; min-height: 100vh; color: #333; overflow-x: hidden;
            /* КРАСОЧНЫЙ АНИМИРОВАННЫЙ ФОН */
            background: linear-gradient(135deg, #fff5f8 0%, #e0f7fa 50%, #fff5f8 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ПАРЯЩИЕ СЛАДОСТИ НА ФОНЕ */
        body::before {
            content: "🍭"; position: fixed; top: 10%; left: 5%; font-size: 4rem; opacity: 0.1; animation: float 6s ease-in-out infinite; z-index: -1;
        }
        body::after {
            content: "🍬"; position: fixed; bottom: 10%; right: 5%; font-size: 4rem; opacity: 0.1; animation: float 8s ease-in-out infinite reverse; z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Бегущая строка - Яркая и Анимированная */
        .ticker {
            background: linear-gradient(90deg, #ff477e, #ff80ab); color: white; padding: 10px 0;
            font-weight: bold; font-size: 1rem; text-transform: uppercase;
            box-shadow: 0 3px 10px rgba(255, 71, 126, 0.3);
        }

        .wrapper { padding: 20px; box-sizing: border-box; animation: fadeIn 1s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Шапка с Ярким Градиентом */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: white; padding: 15px 40px; border-radius: 50px;
            margin: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            animation: slideDown 0.8s ease;
        }

        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        h1 { font-weight: 800; background: linear-gradient(45deg, #ff477e, #00b4d8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }

        .btn-to-cart { 
            background: linear-gradient(45deg, #ff477e, #ff80ab); color: white; border: none; padding: 12px 25px; 
            border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.1rem;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 71, 126, 0.4);
        }
        .btn-to-cart:hover { background: linear-gradient(45deg, #e6396d, #ff477e); transform: scale(1.05); }

        /* Сетка товаров с АНИМАЦИЕЙ КАРТОЧЕК */
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 30px; }
        
        .card { 
            background: white; padding: 25px; border-radius: 25px; text-align: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            position: relative; overflow: hidden;
        }
        
        /* ЭФФЕКТ ПРИ НАВЕДЕНИИ НА КАРТОЧКУ */
        .card:hover { 
            transform: translateY(-10px) scale(1.02); 
            box-shadow: 0 15px 35px rgba(255, 71, 126, 0.2); 
        }
        
        .card img { 
            width: 100%; height: 200px; object-fit: contain; border-radius: 15px; cursor: pointer; 
            transition: transform 0.5s ease;
        }
        
        .card:hover img { transform: rotate(3deg) scale(1.05); }
        
        /* Пульсирующая Кнопка "В корзину" */
        .btn-buy { 
            background: linear-gradient(45deg, #00b4d8, #0077b6); color: white; border: none; padding: 14px; 
            width: 100%; border-radius: 15px; margin-top: 15px; cursor: pointer; 
            font-weight: bold; transition: 0.3s; font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0, 180, 216, 0.3);
        }
        .btn-buy:hover { background: linear-gradient(45deg, #0093af, #00b4d8); animation: pulse 1s infinite; }
        .btn-buy:active { transform: scale(0.95); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 180, 216, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0); }
        }

        /* Корзина с картинками */
        .cart-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px; border-bottom: 1px solid #eee; background: white;
            margin-bottom: 10px; border-radius: 15px; animation: slideInRight 0.5s ease;
        }
        @keyframes slideInRight { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; margin-right: 15px; }
        
        /* Красочное Модальное окно */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .modal-content { 
            background: white; margin: 5% auto; padding: 40px; width: 80%; max-width: 900px; 
            border-radius: 30px; display: flex; gap: 30px; position: relative;
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-left { flex: 1; } .modal-left img { width: 100%; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .modal-right { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 35px; cursor: pointer; color: #ff477e; transition: 0.3s; }
        .close-modal:hover { transform: rotate(90deg); color: #e6396d; }

        /* Админка и Кнопка входа */
        #cartPage, #adminPage { display: none; padding: 40px; background: white; min-height: 100vh; animation: fadeIn 0.8s ease; }
        .admin-link { position: fixed; bottom: 10px; left: 10px; background: none; border: none; color: rgba(0,0,0,0.1); font-size: 0.7rem; cursor: pointer; transition: 0.3s; }
        .admin-link:hover { color: rgba(0,0,0,0.5); font-size: 0.8rem; }
        
        input, select, textarea { 
            width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #f0f0f0; 
            border-radius: 15px; font-size: 1rem; box-sizing: border-box; background: #fafafa;
            transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: #ffdde1; background: white; box-shadow: 0 0 10px rgba(255, 71, 126, 0.1); outline: none; }
    </style>
</head>
<body>

<div class="ticker">
    <marquee scrollamount="7">🍬 DzenJelly - Взрыв вкуса! •  Доставка от 29₽! • Заказывай ярко! • Только натуральное! 🍭</marquee>
</div>

<div id="shopPage">
    <header>
        <h1>🍭 DzenJelly</h1>
        <button id="cartBtn" class="btn-to-cart" onclick="showP('cartPage')">🛒 Корзина (<span id="count">0</span>)</button>
    </header>
    <div class="catalog" id="grid"></div>
    <button class="admin-link" onclick="tryAdmin()">вход для администратора</button>
</div>

<div id="mView" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeM()">&times;</span>
        <div class="modal-left"><img id="mImg" src=""></div>
        <div class="modal-right">
            <h2 id="mTitle"></h2>
            <p><strong>Состав:</strong> <span id="mDesc"></span></p>
            <h3 id="mPrice" style="color:#28a745; font-size: 2rem;"></h3>
            <button id="mBtn" class="btn-buy">Добавить в корзину</button>
        </div>
    </div>
</div>

<div id="cartPage" class="wrapper">
    <button onclick="showP('shopPage')" style="padding:12px 20px; border:none; background:#f0f0f0; border-radius:15px; cursor:pointer; font-weight:bold; transition:0.3s;">⬅ Назад</button>
    <h1>Ваши вкусняшки</h1>
    <div id="cartList"></div>
    <h2 id="total" style="text-align: right; color:#ff477e;">Итого: 0 ₽</h2>
    
    <div style="max-width:450px; background:#fff9fa; padding:30px; border-radius:25px; border: 2px solid #ffdde1; margin-top: 20px; box-shadow: 0 10px 30px rgba(255, 71, 126, 0.1);">
        <h3 style="margin-top:0;">Оформление заказа</h3>
        <input type="text" id="cName" placeholder="Ваше имя">
        <input type="text" id="cPhone" placeholder="Телефон">
        <select id="delType" onchange="document.getElementById('cAddr').style.display=(this.value=='Доставка')?'block':'none'">
            <option value="Самовывоз">Заберу сам</option>
            <option value="Доставка">Доставка по НН</option>
        </select>
        <input type="text" id="cAddr" placeholder="Улица, дом, квартира" style="display:none;">
        <button onclick="sendOrder()" style="background:linear-gradient(45deg, #ff477e, #ff80ab); color:white; width:100%; padding:18px; border:none; border-radius:15px; cursor:pointer; font-weight:bold; font-size:1.2rem; margin-top:15px; box-shadow: 0 5px 15px rgba(255, 71, 126, 0.3);">ЗАКАЗАТЬ! 🍬</button>
    </div>
</div>

<div id="adminPage" class="wrapper">
    <h2>Админка (Matrenka76)</h2>
    <button onclick="location.reload()">Выход</button>
    <hr style="border:1px solid #eee; margin:20px 0;">
    <h3>Добавить товар</h3>
    <div style="max-width: 500px; background: #f9f9f9; padding: 20px; border-radius: 20px;">
        <input type="text" id="pName" placeholder="Название">
        <input type="number" id="pPrice" placeholder="Цена">
        <input type="text" id="pImg" placeholder="Фото (ссылка)">
        <textarea id="pDesc" placeholder="Состав"></textarea>
        <button onclick="dbAddProduct()" style="background:#00b4d8; color:white; padding:15px; width:100%; border:none; border-radius:10px; font-weight:bold;">ОПУБЛИКОВАТЬ</button>
    </div>
    <hr>
    <h3>Все заказы</h3>
    <div id="adminOrders"></div>
</div>

<script>
    // 1. ВСТАВЬ СВОИ ДАННЫЕ ИЗ FIREBASE СЮДА!
    const firebaseConfig = {
        apiKey: "AIzaSyDPYCo_pGKva2kbCtxMcv8swnwetuczGOQ",
        authDomain: "dzenjelly.firebaseapp.com",
        databaseURL: "https://dzenjelly-default-rtdb.firebaseio.com",
        projectId: "dzenjelly",
        storageBucket: "dzenjelly.firebasestorage.app",
        messagingSenderId: "208908478231",
        appId: "1:208908478231:web:bafb276104756b7e603952"
    };

    // Проверка, что конфиг вставлен (для теста)
    if(firebaseConfig.apiKey === "") {
        alert("ОШИБКА: Ты забыл вставить данные Firebase Config в коде (строка ~155)!");
        document.body.innerHTML = "<h1>Пожалуйста, вставь данные Firebase в коде, чтобы сайт заработал!</h1>";
    }

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = [];
    let allP = [];

    // Загрузка товаров из облака (Online!)
    db.ref('products').on('value', (snap) => {
        allP = [];
        const data = snap.val();
        for(let id in data) allP.push({id, ...data[id]});
        renderShop();
    });

    function renderShop() {
        const grid = document.getElementById('grid');
        grid.innerHTML = allP.length ? '' : '<h3>Витрина пуста... Добавь мармелад в админке!</h3>';
        allP.forEach((p, i) => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.img}" onclick="viewP(${i})">
                    <h3 onclick="viewP(${i})" style="cursor:pointer; color:#444;">${p.name}</h3>
                    <div style="font-size:1.5rem; color:#28a745; font-weight:bold; margin-bottom:10px;">${p.price} ₽</div>
                    <button class="btn-buy" onclick="addToCart(${i})">В корзину</button>
                </div>`;
        });
    }

    function addToCart(i) {
        cart.push(allP[i]);
        updateCartCount();
        // Анимация подпрыгивания корзины
        const btn = document.getElementById('cartBtn');
        btn.style.animation = 'none';
        void btn.offsetWidth; // Магия для перезапуска анимации
        btn.style.animation = 'pulse 0.4s ease';
    }

    function updateCartCount() {
        document.getElementById('count').innerText = cart.length;
    }

    function renderCart() {
        const list = document.getElementById('cartList');
        let sum = 0;
        list.innerHTML = cart.length ? '' : '<h3 style="color:#888;">Ваша корзина пока пуста... 🍬</h3>';
        cart.forEach((item, i) => {
            list.innerHTML += `
                <div class="cart-item">
                    <div style="display:flex; align-items:center;">
                        <img src="${item.img}">
                        <div>
                            <div style="font-weight:bold; font-size:1.1rem;">${item.name}</div>
                            <div style="color:#28a745;">${item.price} ₽</div>
                        </div>
                    </div>
                    <button onclick="cart.splice(${i},1); renderCart(); updateCartCount();" style="background:none; border:none; color:#ff477e; font-size:1.2rem; cursor:pointer;">❌</button>
                </div>`;
            sum += item.price;
        });
        document.getElementById('total').innerText = `Итого: ${sum} ₽`;
    }

    function sendOrder() {
        const name = document.getElementById('cName').value;
        const phone = document.getElementById('cPhone').value;
        if(!name || !phone || cart.length == 0) return alert("Ой! Заполните данные или добавьте мармелад!");

        // Отправка заказа в облако Google
        db.ref('orders').push({
            name, phone,
            items: cart.map(i => i.name).join(', '),
            sum: cart.reduce((a,b)=>a+b.price, 0),
            type: document.getElementById('delType').value,
            address: document.getElementById('cAddr').value || '-'
        });

        alert("УРА! Заказ отправлен! Мы скоро позвоним. 🍬");
        cart = []; updateCartCount(); showP('shopPage');
    }

    function tryAdmin() {
        if(prompt("Секретный пароль администратора:") === "Matrenka76") {
            showP('adminPage');
            loadAdminOrders();
        } else { alert("Неверно!"); }
    }

    function dbAddProduct() {
        const name = document.getElementById('pName').value;
        const price = parseInt(document.getElementById('pPrice').value);
        const img = document.getElementById('pImg').value;
        const desc = document.getElementById('pDesc').value;
        if(!name || !price) return alert("Введите имя и цену!");
        db.ref('products').push({name, price, img, desc});
        alert("Мармелад на витрине! 🍭");
        location.reload();
    }

    function loadAdminOrders() {
        db.ref('orders').on('value', (snap) => {
            const out = document.getElementById('adminOrders');
            out.innerHTML = '';
            const data = snap.val();
            for(let id in data) {
                const o = data[id];
                out.innerHTML += `<div style="border:1px solid #eee; padding:15px; margin-bottom:10px; border-radius:10px; background:white;">
                    <b>${o.name}</b> (${o.phone})<br>
                    Товары: ${o.items}<br>
                    Сумма: <b>${o.sum}₽</b><br>
                    Получение: ${o.type} (${o.address})
                </div>`;
            }
        });
    }

    function showP(id) {
        document.getElementById('shopPage').style.display = 'none';
        document.getElementById('cartPage').style.display = 'none';
        document.getElementById('adminPage').style.display = 'none';
        document.getElementById(id).style.display = 'block';
        if(id === 'cartPage') renderCart();
    }

    function viewP(i) {
        const p = allP[i];
        document.getElementById('mImg').src = p.img;
        document.getElementById('mTitle').innerText = p.name;
        document.getElementById('mDesc').innerText = p.desc || 'Секретный рецепт...';
        document.getElementById('mPrice').innerText = `${p.price} ₽`;
        document.getElementById('mBtn').onclick = () => { addToCart(i); closeM(); };
        document.getElementById('mView').style.display = 'block';
    }
    function closeM() { document.getElementById('mView').style.display = 'none'; }

    renderShop();
</script>
</body>
</html>
